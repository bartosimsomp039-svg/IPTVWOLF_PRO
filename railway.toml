[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/wolf-admin run build && cp -r artifacts/wolf-admin/dist/public artifacts/api-server/src/public_static; pnpm --filter @workspace/api-server run build && cp -r artifacts/wolf-admin/dist/public artifacts/api-server/dist/public"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
